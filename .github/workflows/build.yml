name: Build Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '24'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Stamp version into wails.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          if [ "$VERSION" != "dev" ]; then
            sed -i.bak "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"$VERSION\"/" wails.json
            rm -f wails.json.bak
            grep productVersion wails.json
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Run backend tests
        run: go test ./backend/...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          pnpm install
          pnpm run generate-icon

      - name: Install UPX
        run: |
          choco install upx -y

      - name: Build application
        run: wails build -platform windows/amd64

      - name: Compress with UPX
        run: |
          upx --best --lzma "build\bin\Kazoo.exe"

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          Copy-Item -Path "build\bin\Kazoo.exe" -Destination "dist\Kazoo.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/Kazoo.exe
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Stamp version into wails.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          if [ "$VERSION" != "dev" ]; then
            sed -i.bak "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"$VERSION\"/" wails.json
            rm -f wails.json.bak
            grep productVersion wails.json
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Run backend tests
        run: go test ./backend/...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          pnpm install
          pnpm run generate-icon

      - name: Build application
        run: wails build -platform darwin/universal

      - name: Create DMG
        run: |
          mkdir -p dist
          # Wails names the bundle from the project name, so locate it
          # dynamically instead of hardcoding. Stage it as Kazoo.app with an
          # Applications shortcut, then pack with hdiutil (create-dmg's Finder
          # scripting is flaky on hosted runners).
          APP_PATH=$(/usr/bin/find build/bin -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in build/bin:" && ls -la build/bin
            exit 1
          fi
          echo "Packaging $APP_PATH"
          mkdir -p dmg-staging
          cp -R "$APP_PATH" "dmg-staging/Kazoo.app"
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname Kazoo -srcfolder dmg-staging -ov -format UDZO dist/Kazoo.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-portable
          path: dist/Kazoo.dmg
          retention-days: 7

  build-linux:
    name: Build Linux (${{ matrix.display_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: amd64
            runner: ubuntu-24.04
            wails_platform: linux/amd64
            artifact_name: linux-portable
            output_name: Kazoo.AppImage
            appimage_arch: x86_64
            appimagetool_arch: x86_64
            pkgconfig_dir: /usr/lib/x86_64-linux-gnu/pkgconfig
          - display_name: arm64
            runner: ubuntu-24.04-arm
            wails_platform: linux/arm64
            artifact_name: linux-portable-arm
            output_name: Kazoo-ARM.AppImage
            appimage_arch: aarch64
            appimagetool_arch: aarch64
            pkgconfig_dir: /usr/lib/aarch64-linux-gnu/pkgconfig
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Stamp version into wails.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          if [ "$VERSION" != "dev" ]; then
            sed -i.bak "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"$VERSION\"/" wails.json
            rm -f wails.json.bak
            grep productVersion wails.json
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libfuse2 imagemagick upx-ucl

          # Create symlink for webkit2gtk-4.0 -> webkit2gtk-4.1 (Ubuntu 24.04 compatibility)
          sudo ln -sf "${{ matrix.pkgconfig_dir }}/webkit2gtk-4.1.pc" "${{ matrix.pkgconfig_dir }}/webkit2gtk-4.0.pc"

      - name: Run backend tests
        run: go test ./backend/...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          pnpm install
          pnpm run generate-icon

      - name: Build application
        run: wails build -platform ${{ matrix.wails_platform }}

      - name: Compress with UPX
        run: |
          upx --best --lzma build/bin/Kazoo

      - name: Cache appimagetool
        id: cache-appimagetool
        uses: actions/cache@v4
        with:
          path: appimagetool
          key: appimagetool-${{ matrix.appimagetool_arch }}-v2

      - name: Download appimagetool
        if: steps.cache-appimagetool.outputs.cache-hit != 'true'
        run: |
          wget --timeout=30 --tries=5 --retry-connrefused --waitretry=5 -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimagetool_arch }}.AppImage" || \
          wget --timeout=30 --tries=5 --retry-connrefused --waitretry=5 -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-${{ matrix.appimagetool_arch }}.AppImage"

      - name: Make appimagetool executable
        run: chmod +x appimagetool

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy binary
          cp build/bin/Kazoo AppDir/usr/bin/

          # Create desktop file
          cat > AppDir/kazoo.desktop << 'EOF'
          [Desktop Entry]
          Name=Kazoo
          Exec=Kazoo
          Icon=kazoo
          Type=Application
          Categories=Audio;AudioVideo;
          Comment=Music library manager with lossless downloading
          EOF

          cp AppDir/kazoo.desktop AppDir/usr/share/applications/

          # Create icon
          if [ -f "build/appicon.png" ]; then
            convert build/appicon.png -resize 256x256 AppDir/kazoo.png
          elif [ -f "frontend/public/icon.svg" ]; then
            convert -background none -size 256x256 frontend/public/icon.svg AppDir/kazoo.png
          else
            echo "Warning: No icon found, building without icon"
          fi

          # Copy icon if exists
          if [ -f "AppDir/kazoo.png" ]; then
            cp AppDir/kazoo.png AppDir/usr/share/icons/hicolor/256x256/apps/
            cp AppDir/kazoo.png AppDir/.DirIcon
          fi

          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin/:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib/:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/Kazoo" "$@"
          EOF
          chmod +x AppDir/AppRun

          # Create AppImage
          mkdir -p dist
          ARCH=${{ matrix.appimage_arch }} ./appimagetool --no-appstream AppDir "dist/${{ matrix.output_name }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.output_name }}
          retention-days: 7

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Stamp version into wails.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          if [ "$VERSION" != "dev" ]; then
            sed -i.bak "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"$VERSION\"/" wails.json
            rm -f wails.json.bak
            sed -i.bak "s/versionName = \"[^\"]*\"/versionName = \"$VERSION\"/" android-app/app/build.gradle.kts
            rm -f android-app/app/build.gradle.kts.bak
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build frontend (embedded into the Go server)
        working-directory: frontend
        run: |
          pnpm install
          pnpm run generate-icon
          pnpm run build

      - name: Cross-compile Go server for android/arm64
        run: |
          mkdir -p android-app/app/src/main/jniLibs/arm64-v8a
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" \
            -o android-app/app/src/main/jniLibs/arm64-v8a/libkazoo.so .

      - name: Assemble APK
        working-directory: android-app
        run: gradle :app:assembleDebug

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp android-app/app/build/outputs/apk/debug/app-debug.apk dist/Kazoo.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/Kazoo.apk
          retention-days: 7

  create-release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: false
          body: |
            ## Changelog

            ## Downloads

            - `Kazoo.exe` - Windows
            - `Kazoo.dmg` - macOS
            - `Kazoo.AppImage` - Linux AMD64
            - `Kazoo-ARM.AppImage` - Linux ARM64
            - `Kazoo.apk` - Android (arm64, sideload)

            <details>
            <summary><b>Linux Requirements</b></summary>

            The AppImage requires `webkit2gtk-4.1` to be installed on your system:

            **Ubuntu/Debian:**
            ```bash
            sudo apt install libwebkit2gtk-4.1-0
            ```

            **Arch Linux:**
            ```bash
            sudo pacman -S webkit2gtk-4.1
            ```

            **Fedora:**
            ```bash
            sudo dnf install webkit2gtk4.1
            ```

            After installing the dependency, make the AppImage executable:
            ```bash
            chmod +x Kazoo.AppImage
            ./Kazoo.AppImage
            ```

            For ARM64:
            ```bash
            chmod +x Kazoo-ARM.AppImage
            ./Kazoo-ARM.AppImage
            ```

            </details>
          files: |
            artifacts/windows-portable/Kazoo.exe
            artifacts/macos-portable/Kazoo.dmg
            artifacts/linux-portable/Kazoo.AppImage
            artifacts/linux-portable-arm/Kazoo-ARM.AppImage
            artifacts/android-apk/Kazoo.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
